<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📚 StudyMate - AI 学习陪练</title>
    <style>
        :root {
            --primary: #6366f1;
            --primary-light: #818cf8;
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text: #f1f5f9;
            --text-muted: #94a3b8;
            --border: #334155;
            --success: #22c55e;
            --warning: #f59e0b;
            --danger: #ef4444;
            --gradient: linear-gradient(135deg, #6366f1, #a855f7);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            line-height: 1.6;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Header */
        header {
            text-align: center;
            padding: 40px 0;
            background: var(--gradient);
            border-radius: 20px;
            margin-bottom: 30px;
        }

        header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        header p {
            color: rgba(255,255,255,0.8);
            font-size: 1.1rem;
        }

        /* Stats */
        .stats-bar {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin: 20px 0 30px;
        }

        .stat-item {
            text-align: center;
            padding: 15px 25px;
            background: var(--card-bg);
            border-radius: 12px;
            border: 1px solid var(--border);
        }

        .stat-value {
            font-size: 2rem;
            font-weight: bold;
            color: var(--primary);
        }

        .stat-label {
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        /* Mode Selection */
        .mode-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .mode-card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 25px;
            border: 2px solid var(--border);
            cursor: pointer;
            transition: all 0.3s;
        }

        .mode-card:hover {
            border-color: var(--primary);
            transform: translateY(-4px);
            box-shadow: 0 10px 30px rgba(99, 102, 241, 0.2);
        }

        .mode-card.active {
            border-color: var(--primary);
            background: linear-gradient(135deg, rgba(99,102,241,0.2), rgba(168,85,247,0.2));
        }

        .mode-icon {
            font-size: 2.5rem;
            margin-bottom: 15px;
        }

        .mode-card h3 {
            font-size: 1.3rem;
            margin-bottom: 8px;
        }

        .mode-card p {
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        /* Input Section */
        .input-section {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 25px;
            border: 1px solid var(--border);
            margin-bottom: 20px;
        }

        .input-section h2 {
            font-size: 1.3rem;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        .form-group input, .form-group textarea, .form-group select {
            width: 100%;
            padding: 14px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: var(--bg);
            color: var(--text);
            font-size: 15px;
            font-family: inherit;
        }

        .form-group textarea {
            min-height: 150px;
            resize: vertical;
            line-height: 1.6;
        }

        .form-group input:focus, .form-group textarea:focus, .form-group select:focus {
            outline: none;
            border-color: var(--primary);
        }

        .btn {
            padding: 14px 28px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            font-size: 15px;
            font-weight: 500;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: var(--gradient);
            color: white;
        }

        .btn-primary:hover {
            opacity: 0.9;
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: var(--bg);
            color: var(--text);
            border: 1px solid var(--border);
        }

        /* Quiz Section */
        .quiz-section {
            display: none;
            background: var(--card-bg);
            border-radius: 16px;
            padding: 25px;
            border: 1px solid var(--border);
        }

        .quiz-section.active {
            display: block;
        }

        .question-card {
            background: var(--bg);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .question-number {
            display: inline-block;
            background: var(--primary);
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            margin-bottom: 15px;
        }

        .question-text {
            font-size: 1.1rem;
            margin-bottom: 20px;
            line-height: 1.7;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .option {
            padding: 14px 18px;
            border-radius: 10px;
            border: 1px solid var(--border);
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .option:hover {
            border-color: var(--primary);
            background: rgba(99, 102, 241, 0.1);
        }

        .option.selected {
            border-color: var(--primary);
            background: rgba(99, 102, 241, 0.2);
        }

        .option.correct {
            border-color: var(--success);
            background: rgba(34, 197, 94, 0.2);
        }

        .option.wrong {
            border-color: var(--danger);
            background: rgba(239, 68, 68, 0.2);
        }

        .option-letter {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 0.9rem;
        }

        .option.correct .option-letter {
            background: var(--success);
        }

        .option.wrong .option-letter {
            background: var(--danger);
        }

        /* Results */
        .results {
            text-align: center;
            padding: 30px;
        }

        .results-score {
            font-size: 4rem;
            font-weight: bold;
            background: var(--gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        .results-message {
            font-size: 1.2rem;
            color: var(--text-muted);
            margin-bottom: 30px;
        }

        /* Interview Mode */
        .interview-chat {
            background: var(--bg);
            border-radius: 12px;
            padding: 20px;
            max-height: 400px;
            overflow-y: auto;
            margin-bottom: 20px;
        }

        .chat-message {
            margin-bottom: 20px;
            padding: 15px 18px;
            border-radius: 12px;
            max-width: 85%;
        }

        .chat-message.ai {
            background: var(--card-bg);
            border-left: 3px solid var(--primary);
            margin-right: auto;
        }

        .chat-message.user {
            background: rgba(99, 102, 241, 0.2);
            margin-left: auto;
            border-right: 3px solid var(--primary);
        }

        .chat-role {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        .interview-input {
            display: flex;
            gap: 10px;
        }

        .interview-input input {
            flex: 1;
            padding: 14px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: var(--bg);
            color: var(--text);
            font-size: 15px;
        }

        /* Progress */
        .progress-section {
            margin-top: 30px;
        }

        .progress-item {
            background: var(--card-bg);
            border-radius: 10px;
            padding: 15px 20px;
            margin-bottom: 10px;
            border: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: var(--border);
            border-radius: 4px;
            overflow: hidden;
            margin-top: 5px;
        }

        .progress-fill {
            height: 100%;
            background: var(--gradient);
            transition: width 0.3s;
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: var(--success);
            color: white;
            padding: 15px 25px;
            border-radius: 10px;
            display: none;
            z-index: 1000;
            font-weight: 500;
        }

        .toast.show { display: block; }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 40px;
            color: var(--text-muted);
        }

        @media (max-width: 768px) {
            .stats-bar {
                flex-wrap: wrap;
            }
            .mode-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📚 StudyMate</h1>
            <p>你的私人 AI 学习陪练</p>
        </header>

        <!-- Stats -->
        <div class="stats-bar">
            <div class="stat-item">
                <div class="stat-value" id="totalQuestions">0</div>
                <div class="stat-label">刷题总数</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="correctRate">0%</div>
                <div class="stat-label">正确率</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="streakDays">0</div>
                <div class="stat-label">连续学习</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="topicsLearned">0</div>
                <div class="stat-label">掌握主题</div>
            </div>
        </div>

        <!-- Mode Selection -->
        <div class="mode-grid">
            <div class="mode-card active" onclick="selectMode('practice')">
                <div class="mode-icon">📝</div>
                <h3>刷题练习</h3>
                <p>输入学习材料，AI 自动生成针对性练习题</p>
            </div>
            <div class="mode-card" onclick="selectMode('interview')">
                <div class="mode-icon">🎯</div>
                <h3>模拟面试</h3>
                <p>根据岗位描述，AI 模拟真实面试官提问</p>
            </div>
            <div class="mode-card" onclick="selectMode('explain')">
                <div class="mode-icon">💡</div>
                <h3>概念讲解</h3>
                <p>输入复杂概念，AI 用通俗语言讲解</p>
            </div>
        </div>

        <!-- Practice Mode -->
        <div class="input-section" id="practiceSection">
            <h2>📝 刷题练习</h2>
            <div class="form-group">
                <label>学习主题（必填）</label>
                <input type="text" id="topic" placeholder="例如：Python 基础语法、机器学习入门...">
            </div>
            <div class="form-group">
                <label>学习材料（可选）</label>
                <textarea id="material" placeholder="粘贴你的笔记、教材内容、论文摘要...AI 会基于这些内容生成题目"></textarea>
            </div>
            <div class="form-group">
                <label>题目类型</label>
                <select id="questionType">
                    <option value="mixed">混合（选择题 + 判断题）</option>
                    <option value="choice">选择题</option>
                    <option value="truefalse">判断题</option>
                    <option value="fill">填空题</option>
                </select>
            </div>
            <div class="form-group">
                <label>题目数量</label>
                <select id="questionCount">
                    <option value="5">5 题</option>
                    <option value="10" selected>10 题</option>
                    <option value="15">15 题</option>
                    <option value="20">20 题</option>
                </select>
            </div>
            <button class="btn btn-primary" onclick="generateQuestions()">
                🎯 开始刷题
            </button>
        </div>

        <!-- Interview Mode -->
        <div class="input-section" id="interviewSection" style="display: none;">
            <h2>🎯 模拟面试</h2>
            <div class="form-group">
                <label>目标岗位（必填）</label>
                <input type="text" id="targetJob" placeholder="例如：后端工程师、算法工程师...">
            </div>
            <div class="form-group">
                <label>岗位描述（可选）</label>
                <textarea id="jobDesc" placeholder="粘贴岗位招聘信息，AI 会根据要求准备问题"></textarea>
            </div>
            <div class="form-group">
                <label>你的经验水平</label>
                <select id="experienceLevel">
                    <option value="junior">应届生/初级</option>
                    <option value="mid">1-3年经验</option>
                    <option value="senior">3-5年经验</option>
                    <option value="expert">5年+经验</option>
                </select>
            </div>
            <button class="btn btn-primary" onclick="startInterview()">
                🎤 开始面试
            </button>
        </div>

        <!-- Explain Mode -->
        <div class="input-section" id="explainSection" style="display: none;">
            <h2>💡 概念讲解</h2>
            <div class="form-group">
                <label>想了解的概念（必填）</label>
                <input type="text" id="concept" placeholder="例如：什么是Transformer？什么是梯度下降？">
            </div>
            <div class="form-group">
                <label>你的背景（可选）</label>
                <select id="userBackground">
                    <option value="beginner">完全小白</option>
                    <option value="basic">有一点基础</option>
                    <option value="intermediate">有一定了解</option>
                    <option value="advanced">想深入了解</option>
                </select>
            </div>
            <button class="btn btn-primary" onclick="explainConcept()">
                💬 开始讲解
            </button>
        </div>

        <!-- Quiz Section -->
        <div class="quiz-section" id="quizSection">
            <div class="results" id="quizResults" style="display: none;">
                <div class="results-score" id="scoreDisplay">0%</div>
                <div class="results-message" id="scoreMessage">继续加油！</div>
                <button class="btn btn-primary" onclick="restartQuiz()">🔄 再来一组</button>
            </div>
            <div id="questionsContainer"></div>
        </div>

        <!-- Interview Chat -->
        <div class="quiz-section" id="interviewChat">
            <div class="interview-chat" id="chatContainer">
                <div class="empty-state">
                    点击"开始面试"后，AI 面试官会向你提问
                </div>
            </div>
            <div class="interview-input">
                <input type="text" id="userAnswer" placeholder="输入你的回答..." onkeypress="handleAnswerKeypress(event)">
                <button class="btn btn-primary" onclick="sendAnswer()">发送</button>
            </div>
        </div>

        <!-- Progress -->
        <div class="progress-section">
            <h3 style="margin-bottom: 15px;">📊 学习进度</h3>
            <div id="progressList"></div>
        </div>
    </div>

    <div class="toast" id="toast">已保存！</div>

    <script>
        // State
        let currentMode = 'practice';
        let questions = [];
        let currentQuestionIndex = 0;
        let correctCount = 0;
        let stats = JSON.parse(localStorage.getItem('studyMateStats')) || {
            total: 0,
            correct: 0,
            streak: 0,
            lastDate: null,
            topics: {}
        };

        // Initialize
        function init() {
            updateStats();
            renderProgress();
        }

        function updateStats() {
            document.getElementById('totalQuestions').textContent = stats.total;
            document.getElementById('correctRate').textContent = 
                stats.total > 0 ? Math.round((stats.correct / stats.total) * 100) + '%' : '0%';
            document.getElementById('streakDays').textContent = stats.streak;
            document.getElementById('topicsLearned').textContent = Object.keys(stats.topics).length;
        }

        function renderProgress() {
            const container = document.getElementById('progressList');
            const topicEntries = Object.entries(stats.topics).sort((a, b) => b[1].total - a[1].total).slice(0, 5);
            
            if (topicEntries.length === 0) {
                container.innerHTML = '<div class="empty-state">还没有学习记录</div>';
                return;
            }

            container.innerHTML = topicEntries.map(([topic, data]) => `
                <div class="progress-item">
                    <div>
                        <div>${topic}</div>
                        <div style="font-size: 0.85rem; color: var(--text-muted);">
                            ${data.correct}/${data.total} 题 · ${Math.round((data.correct/data.total)*100)}%正确率
                        </div>
                    </div>
                    <div class="progress-bar" style="width: 100px;">
                        <div class="progress-fill" style="width: ${(data.correct/data.total)*100}%"></div>
                    </div>
                </div>
            `).join('');
        }

        // Mode Selection
        function selectMode(mode) {
            currentMode = mode;
            
            document.querySelectorAll('.mode-card').forEach(card => card.classList.remove('active'));
            event.currentTarget.classList.add('active');

            document.getElementById('practiceSection').style.display = mode === 'practice' ? 'block' : 'none';
            document.getElementById('interviewSection').style.display = mode === 'interview' ? 'block' : 'none';
            document.getElementById('explainSection').style.display = mode === 'explain' ? 'block' : 'none';
            document.getElementById('quizSection').style.display = 'none';
            document.getElementById('interviewChat').style.display = mode === 'interview' ? 'block' : 'none';
        }

        // Practice Mode - Generate Questions
        function generateQuestions() {
            const topic = document.getElementById('topic').value.trim();
            const material = document.getElementById('material').value.trim();
            const questionType = document.getElementById('questionType').value;
            const count = parseInt(document.getElementById('questionCount').value);

            if (!topic) {
                alert('请输入学习主题');
                return;
            }

            // Generate sample questions (in real app, this would call an AI API)
            questions = generateSampleQuestions(topic, material, questionType, count);
            currentQuestionIndex = 0;
            correctCount = 0;

            document.getElementById('quizSection').classList.add('active');
            document.getElementById('quizResults').style.display = 'none';
            renderQuestion();
        }

        function generateSampleQuestions(topic, material, type, count) {
            // This is a simplified version - in production, you'd call an AI API
            const questionBank = {
                'Python': [
                    { q: 'Python 中，以下哪个是正确的列表定义？', options: ['list = {}', 'list = []', 'list = ()', 'list = <>'], correct: 1 },
                    { q: 'Python 函数的返回值用哪个关键字？', options: ['return', 'output', 'give', 'function'], correct: 0 },
                    { q: '如何获取列表的第一个元素？', options: ['list[0]', 'list[1]', 'list[first]', 'list[-0]'], correct: 0 },
                    { q: 'Python 中用于循环遍历的结构是？', options: ['for', 'loop', 'iterate', 'while'], correct: 0 },
                    { q: '哪个方法可以向列表添加元素？', options: ['append()', 'add()', 'push()', 'insertEnd()'], correct: 0 },
                ],
                'default': [
                    { q: `关于${topic}，以下哪个说法是正确的？`, options: ['A. 这是第一个选项', 'B. 这是第二个选项', 'C. 这是第三个选项', 'D. 这是第四个选项'], correct: Math.floor(Math.random() * 4) },
                    { q: `${topic}的核心概念是什么？`, options: ['概念A', '概念B', '概念C', '概念D'], correct: Math.floor(Math.random() * 4) },
                    { q: `${topic}的主要应用场景包括？`, options: ['场景1', '场景2', '场景3', '以上都是'], correct: 3 },
                    { q: '学习${topic}需要注意什么？', options: ['重点1', '重点2', '重点3', '都需要注意'], correct: 3 },
                    { q: '${topic}与相关技术的区别是？', options: ['区别1', '区别2', '区别3', '以上都是'], correct: 3 },
                ]
            };

            let bank = questionBank[topic] || questionBank['default'];
            let result = [];
            
            for (let i = 0; i < count; i++) {
                let q = bank[i % bank.length];
                result.push({
                    ...q,
                    q: q.q.replace(/\$\{topic\}/g, topic)
                });
            }

            return result;
        }

        function renderQuestion() {
            if (currentQuestionIndex >= questions.length) {
                showResults();
                return;
            }

            const q = questions[currentQuestionIndex];
            const container = document.getElementById('questionsContainer');
            
            container.innerHTML = `
                <div class="question-card">
                    <span class="question-number">${currentQuestionIndex + 1} / ${questions.length}</span>
                    <div class="question-text">${q.q}</div>
                    <div class="options">
                        ${q.options.map((opt, idx) => `
                            <div class="option" onclick="selectOption(${idx})">
                                <span class="option-letter">${String.fromCharCode(65 + idx)}</span>
                                <span>${opt}</span>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        }

        function selectOption(idx) {
            const q = questions[currentQuestionIndex];
            const options = document.querySelectorAll('.option');
            
            options.forEach((opt, i) => {
                opt.classList.remove('selected');
                if (i === q.correct) {
                    opt.classList.add('correct');
                } else if (i === idx && idx !== q.correct) {
                    opt.classList.add('wrong');
                }
                opt.style.pointerEvents = 'none';
            });

            if (idx === q.correct) {
                correctCount++;
                stats.correct++;
            }
            stats.total++;

            // Update topic stats
            const topic = document.getElementById('topic').value;
            if (!stats.topics[topic]) {
                stats.topics[topic] = { total: 0, correct: 0 };
            }
            stats.topics[topic].total++;
            if (idx === q.correct) {
                stats.topics[topic].correct++;
            }

            localStorage.setItem('studyMateStats', JSON.stringify(stats));
            updateStats();

            setTimeout(() => {
                currentQuestionIndex++;
                renderQuestion();
            }, 1000);
        }

        function showResults() {
            const score = Math.round((correctCount / questions.length) * 100);
            document.getElementById('quizResults').style.display = 'block';
            document.getElementById('scoreDisplay').textContent = score + '%';
            
            let message = '';
            if (score >= 90) message = '🎉 太棒了！完全掌握！';
            else if (score >= 70) message = '👍 很不错！继续加油！';
            else if (score >= 50) message = '💪 有进步空间，再接再厉！';
            else message = '📚 需要多加复习哦~';
            
            document.getElementById('scoreMessage').textContent = message;
            renderProgress();
        }

        function restartQuiz() {
            document.getElementById('quizSection').classList.remove('active');
            document.getElementById('quizSection').style.display = 'none';
            document.getElementById('topic').value = '';
            document.getElementById('material').value = '';
        }

        // Interview Mode
        let interviewTopic = '';
        let interviewMessages = [];

        function startInterview() {
            const job = document.getElementById('targetJob').value.trim();
            if (!job) {
                alert('请输入目标岗位');
                return;
            }

            interviewTopic = job;
            interviewMessages = [
                { role: 'ai', content: `你好！我是你的 AI 面试官。今天我们来模拟${job}的面试。\n\n请先简单介绍一下你自己吧？` }
            ];

            document.getElementById('chatContainer').innerHTML = `
                <div class="chat-message ai">
                    <div class="chat-role">🎯 AI 面试官</div>
                    <div>你好！我是你的 AI 面试官。今天我们来模拟${job}的面试。\n\n请先简单介绍一下你自己吧？</div>
                </div>
            `;
        }

        function handleAnswerKeypress(e) {
            if (e.key === 'Enter') {
                sendAnswer();
            }
        }

        function sendAnswer() {
            const input = document.getElementById('userAnswer');
            const answer = input.value.trim();
            if (!answer) return;

            // Add user message
            interviewMessages.push({ role: 'user', content: answer });
            
            const chatContainer = document.getElementById('chatContainer');
            chatContainer.innerHTML += `
                <div class="chat-message user">
                    <div class="chat-role">👤 你</div>
                    <div>${answer}</div>
                </div>
            `;

            input.value = '';
            chatContainer.scrollTop = chatContainer.scrollHeight;

            // Simulate AI response
            setTimeout(() => {
                const nextQuestion = generateNextQuestion(interviewMessages.length);
                interviewMessages.push({ role: 'ai', content: nextQuestion });
                
                chatContainer.innerHTML += `
                    <div class="chat-message ai">
                        <div class="chat-role">🎯 AI 面试官</div>
                        <div>${nextQuestion}</div>
                    </div>
                `;
                chatContainer.scrollTop = chatContainer.scrollHeight;
            }, 1000);
        }

        function generateNextQuestion(step) {
            const questions = [
                '很好！请说说你对这个岗位的理解，以及你为什么想做这个工作？',
                '你觉得自己最大的优势是什么？',
                '你遇到过最大的技术挑战是什么？你是怎么解决的？',
                '请介绍一下你的项目经验中最有代表性的一个？',
                '你对这个领域的未来发展趋势有什么看法？',
                '如果让你独立完成一个项目，你会如何规划？',
                '你还有什么问题想问我吗？',
            ];
            return questions[Math.min(step - 1, questions.length - 1)];
        }

        // Explain Mode
        function explainConcept() {
            const concept = document.getElementById('concept').value.trim();
            const background = document.getElementById('userBackground').value;
            
            if (!concept) {
                alert('请输入想了解的概念');
                return;
            }

            const explanations = {
                beginner: `## ${concept} - 入门理解\n\n想象一下，${concept}就像是...\n\n### 🎯 简单说\n（这就是它的最基本定义）\n\n### 💡 有什么用\n1. 第一个用途\n2. 第二个用途\n\n### 📝 例子\n就像吃饭要用筷子，${concept}的作用是...`,
                basic: `## ${concept} - 基础讲解\n\n### 🔰 什么是${concept}\n${concept}是...\n\n### ⚡ 核心要点\n- 要点1\n- 要点2\n\n### 🛠️ 实际应用\n在生活中，我们这样使用它...`,
                intermediate: `## ${concept} - 深入理解\n\n### 📖 详细定义\n${concept}是...的一种实现方式...\n\n### 🔧 技术原理\n它的底层逻辑是...\n\n### 📊 优缺点\n**优点**：\n**缺点**：`,
                advanced: `## ${concept} - 专家视角\n\n### 🧠 深度分析\n从架构层面来看，${concept}...\n\n### 🔬 底层原理\n核心算法/机制是...\n\n### 🏗️ 最佳实践\n在生产环境中，应该注意...\n\n### 🔮 发展趋势\n未来的演进方向是...`
            };

            const result = explanations[background].replace(/\$\{concept\}/g, concept);
            
            // Show in a new section
            let explainSection = document.getElementById('explainSection');
            explainSection.innerHTML = `
                <h2>💡 ${concept} 讲解</h2>
                <div style="white-space: pre-wrap; line-height: 1.8; padding: 20px; background: var(--bg); border-radius: 12px;">
                    ${result}
                </div>
                <button class="btn btn-secondary" onclick="location.reload()" style="margin-top: 20px;">
                    🔄 再学一个新概念
                </button>
            `;
        }

        // Initialize
        init();
    </script>
</body>
</html>
